<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='signup_page.css') }}">
    <title>Sign Up | Agro-Aqua AI</title>
</head>
<body>
    <div class="auth_container">
        <div class="auth_box auth_tall">
            <h1>Agro-Aqua AI</h1>
            <p>Create your account</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash_box">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form action="/signup" method="POST">
                <div class="input_group"><label>Name</label><input type="text" name="name" placeholder="Enter your name" required></div>
                <div class="input_group"><label>Email</label><input type="email" name="email" placeholder="Enter your email" required></div>
                <div class="input_group"><label>Phone Number</label><input type="tel" name="phone" placeholder="Enter your phone number" required></div>
                <div class="input_group"><label>Age</label><input type="number" name="age" placeholder="Enter your age" required></div>
                <div class="input_group"><label>Place</label><input type="text" name="place" placeholder="Enter your place" required></div>
                <div class="input_group"><label>Create Password</label><input type="password" name="password" placeholder="Create password" required></div>
                <div class="input_group"><label>Confirm Password</label><input type="password" name="confirm_password" placeholder="Confirm password" required></div>
                <button type="submit">Sign Up</button>
            </form>

            <div class="bottom_text">
                <p>Already have an account? <a href="/login">Login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
