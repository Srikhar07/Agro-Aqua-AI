<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='plant_disease.css') }}">
    <title>Plant Disease Detection | AgroAqua AI</title>
</head>
<body>
    <div class="page_wrap">
        <div class="page_card">
            <div class="top_bar">
                <a href="/dashboard">← Back</a>
            </div>
            <h1>Plant Disease Detection</h1>
            <p class="subtext">This notebook is tabular ML, not image upload.</p>

            <form method="POST">
                <label>Temperature</label>
                <input type="number" step="any" name="temperature" placeholder="Temperature" required>
                <label>Humidity</label>
                <input type="number" step="any" name="humidity" placeholder="Humidity" required>
                <label>Rainfall</label>
                <input type="number" step="any" name="rainfall" placeholder="Rainfall" required>
                <label>Soil pH</label>
                <input type="number" step="any" name="soil_pH" placeholder="Soil pH" required>
                <button type="submit">Predict</button>
            </form>

            {% if prediction is not none %}
            <div class="result_box">
                <h2>Prediction Result</h2>
                <p>{{ prediction }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
